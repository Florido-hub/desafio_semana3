name: Continuos Integration

on: [ pull_request, push ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Faz o checkout do código do seu repositório para dentro da máquina do GitHub
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Configura o ambiente do Python na máquina virtual
    - name: Configurar Python
      uses: actions/actions-setup-python@v5
      with:
        python-version: '3.11' # Versão estável do Python

    # 3. Faz o cache das dependências para deixar as próximas execuções mais rápidas
    - name: Cache de dependências do Python
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. Instala as bibliotecas necessárias (pytest, requests, etc.)
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 5. Executa os testes automatizados gerando logs detalhados
    - name: Executar Pytest
      run: |
        python -m pytest -v

